<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - CinemaPass</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="main-nav"></header>
    <main>
        <div class="auth-wrapper">
            <div class="auth-card">
                <h2>Регистрация</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label for="full_name">ФИО</label>
                        <input type="text" id="full_name" class="form-control" placeholder="Иван Иванов" required>
                    </div>
                    <div class="form-group">
                        <label for="username">Имя пользователя (логин)</label>
                        <input type="text" id="username" class="form-control" placeholder="ivan123" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">Зарегистрироваться</button>
                </form>
                <div class="auth-footer">Уже есть аккаунт? <a href="login.html">Войти</a></div>
            </div>
        </div>
    </main>
    <script src="js/app.js"></script>
    <script>
        if (isAuthorized()) location.href = "movies.html";
        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const f = document.getElementById("full_name").value.trim();
            const u = document.getElementById("username").value.trim();
            const p = document.getElementById("password").value.trim();
            try {
                await apiFetch("/register", { method: "POST", body: { full_name: f, username: u, password: p } });
                showToast("Регистрация успешна!", "success");
                setTimeout(() => location.href = "login.html", 1500);
            } catch (err) { showToast(err.message, "error"); }
        });
    </script>
</body>
</html>
