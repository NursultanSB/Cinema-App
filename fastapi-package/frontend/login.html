<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - CinemaPass</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="main-nav"></header>
    <main>
        <div class="auth-wrapper">
            <div class="auth-card">
                <h2>Вход в систему</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Имя пользователя (логин)</label>
                        <input type="text" id="username" class="form-control" placeholder="ivan123" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">Войти</button>
                </form>
                <div class="auth-footer">Еще нет аккаунта? <a href="register.html">Создать</a></div>
            </div>
        </div>
    </main>
    <script src="js/app.js"></script>
    <script>
        if (isAuthorized()) location.href = "movies.html";
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const u = document.getElementById("username").value.trim();
            const p = document.getElementById("password").value.trim();
            try {
                const data = await apiFetch("/login", { method: "POST", body: { username: u, password: p } });
                setToken(data.token);
                showToast("Успешный вход!", "success");
                setTimeout(() => location.href = "movies.html", 1000);
            } catch (err) { showToast(err.message, "error"); }
        });
    </script>
</body>
</html>
